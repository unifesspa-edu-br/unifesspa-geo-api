services:
  postgres:
    # Imagem PostGIS (superset de postgres:18) usada pelo Geo para geography(Point,4326).
    # O init-db cria apenas o banco Geo e o banco do Keycloak local.
    image: postgis/postgis:18-3.6
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  openldap:
    # OpenLDAP local com dados sintéticos (4devs) para reproduzir o cenário
    # do LDAP institucional Unifesspa em ambiente de desenvolvimento.
    # Usado para testar Identity Brokering com gov.br + matching de CPF
    # contra users LDAP-federados (incluindo casos de CPF com zero à esquerda
    # truncado, bug histórico do brPersonCPF institucional).
    # Ver issue uniplus-api#217 e ADR-029.
    #
    # Imagem: osixia/openldap (não recebe updates desde 2021 mas é estável e
    # amplamente usada em dev. Bitnami descontinuou bitnami/openldap em 2025).
    # Para dev local com dados sintéticos é suficiente — não usar em PROD.
    image: osixia/openldap:1.5.0
    restart: unless-stopped
    command: ["--copy-service", "--loglevel", "info"]
    environment:
      LDAP_ORGANISATION: "Unifesspa Local Sintetico"
      LDAP_DOMAIN: "unifesspa.edu.br"
      LDAP_BASE_DN: "dc=unifesspa,dc=edu,dc=br"
      LDAP_ADMIN_PASSWORD: "admin"
      LDAP_TLS: "false"
      LDAP_REMOVE_CONFIG_AFTER_SETUP: "false"
    ports:
      # Mapeamento limitado a 127.0.0.1 — porta NÃO exposta na LAN.
      # Mitiga risco de bind anônimo/credencial fraca (admin/admin) em laptop
      # compartilhado ou rede insegura. Para acesso de outra máquina, usar
      # SSH tunnel (ssh -L 1389:localhost:1389 dev-host).
      # Imagem osixia/openldap:1.5.0 não recebe updates desde 2021 — não é
      # apropriada para PROD; o isolamento por loopback compensa.
      - "127.0.0.1:1389:389"
    volumes:
      - ./ldap/bootstrap:/container/service/slapd/assets/config/bootstrap/ldif/custom:ro
      - openldap_data:/var/lib/ldap
      - openldap_config:/etc/ldap/slapd.d
    healthcheck:
      test: ["CMD-SHELL", "ldapsearch -x -H ldap://localhost:389 -b dc=unifesspa,dc=edu,dc=br -D 'cn=admin,dc=unifesspa,dc=edu,dc=br' -w admin -s base 'objectClass=*' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  keycloak:
    image: ghcr.io/unifesspa-edu-br/uniplus-keycloak:26.6.4
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      # Canonicaliza o issuer dos tokens para http://localhost:8080 — independente
      # do hostname usado pra acessar o Keycloak (host: localhost; rede docker: keycloak).
      # Sem isso, tokens emitidos via host têm iss=localhost mas a discovery via
      # rede interna retorna iss=keycloak, quebrando a validação JWT nas APIs.
      KC_HOSTNAME: "http://localhost:8080"
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && timeout 1 cat <&3 | grep -q '\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  postgres_data:
  openldap_data:
  openldap_config:
