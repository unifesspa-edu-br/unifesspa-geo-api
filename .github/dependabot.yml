version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Belem
    open-pull-requests-limit: 5
    labels:
      - chore
      - deps
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      opentelemetry:
        patterns:
          - OpenTelemetry.*
          - Serilog.Sinks.OpenTelemetry
      wolverine:
        patterns:
          - WolverineFx*
      ef-core:
        patterns:
          - Microsoft.EntityFrameworkCore*
          - Npgsql*
      serilog:
        patterns:
          - Serilog*
        exclude-patterns:
          - Serilog.Sinks.OpenTelemetry
      kafka:
        patterns:
          - Confluent.*
          - Apache.Avro
      testing:
        patterns:
          - xunit*
          - Microsoft.NET.Test.Sdk
          - Microsoft.AspNetCore.Mvc.Testing
          - AwesomeAssertions
          - NSubstitute
          - Bogus
          - Testcontainers*
          - coverlet.collector
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Belem
    open-pull-requests-limit: 2
    labels:
      - chore
      - ci
    commit-message:
      prefix: chore(ci)
      include: scope
    groups:
      github-actions-all:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
